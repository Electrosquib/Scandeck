<!DOCTYPE html>
<html>
    <head>
        <link rel="stylesheet" href="styles/styles.css">
    </head>
<body>
<div class="cont top-cont">
    <div class="plain">SYSTEM:</div>
    <div class="cool">Hawaii County Public Safety</div>
</div>
<div class="halves">
    <div class="left">
        <h1 class="cool">HAWAII FIRE DEPT.</h1>
        <div class="top-inf">
            <div id="freq"><p>144.725 MHz</p></div>
            <div class="">
                <div id="tgid" class="sbutton"><p>1024</p></div>
                <div id="modulation" class="button"><p>P25</p></div>
            </div>
            
        </div>
        <div class="cont info">
            <div id="dept"><div class="i">DEPT:</div><div class="v">Fire Department</div></div>
            <div id="dept"><div class="i">SERVICE:</div><div class="v">Fire</div></div>
            <div id="dept"><div class="i">WACN:</div><div class="v">12345</div></div>
            <div id="dept"><div class="i">NAC:</div><div class="v">0x1234</div></div>
            <div id="dept"><div class="i">SITE ID:</div><div class="v">HAW1234</div></div>
        </div>
    </div>
    <div class="right cont">
        <h3 class="cool">
            RECENT
        </h3>
        <div class="recent">
            <p>Hawaii Fire Dept.</p>
            <p>DLNR.</p>
            <p>Police Dispatch.</p>
            <p>Hawaii Fire Dept.</p>
            <p>The gang.</p>
        </div>
    </div>
</div>

<div class="buttons">
    <div id="scan" class="sbutton clickable">
        SCAN
    </div>
    <div id="hold" class="button clickable">
        HOLD
    </div>
    <div id="NEXT" class="button clickable">
        NEXT
    </div>
    <div id="MENU" class="button clickable">
        MENU
    </div>

</div>

<script src="renderer.js"></script>
</body>
</html>
